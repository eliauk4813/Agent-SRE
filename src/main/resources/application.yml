server:
  port: 9900
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

file:
  upload:
    path: ./uploads
    allowed-extensions: txt,md

milvus:
  host: localhost
  port: 19530
  username: ""
  password: ""
  database: default
  timeout: 10000
  metric-type: COSINE

# Spring AI Alibaba DashScope 配置
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/agent_elk?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  ai:
    dashscope:
      api-key: sk-9d4d54079be34c3e90b6074910b87ede  # 从环境变量读取或使用默认值
      chat:
        options:
          timeout: 180000  # 超时时间180秒（3分钟）
      retry:
        max-attempts: 3  # 最大重试次数
        backoff:
          initial-interval: 2000  # 初始重试间隔2秒
          multiplier: 2  # 重试间隔倍数
          max-interval: 10000  # 最大重试间隔10秒

    # Spring AI MCP 客户端配置
    # 如果使用mock数据，请注释这部分内容
    mcp:
      client:
        enabled: true
        name: tencent-mcp-server
        version: 1.0.0
        request-timeout: 60s
        type: ASYNC
        sse:
          connections:
            tencent-cls:
              url: https://mcp-api.tencent-cloud.com
              sse-endpoint: /sse/312b67afe5edbdb2  # 完整的SSE端点路径

# 阿里云 DashScope Embedding API 配置
dashscope:
  api:
    key: sk-9d4d54079be34c3e90b6074910b87ede  # 从环境变量读取或使用默认值（用于自定义配置）
  embedding:
    model: text-embedding-v4  # 阿里云文本向量化模型

# 文档分片配置
document:
  chunk:
    max-size: 800  # 每个分片最大字符数
    overlap: 100   # 分片之间的重叠字符数

# RAG 配置
rag:
  vector-top-k: 5
  bm25-top-k: 5
  final-top-n: 4
  rrf-k: 60
  model: "qwen3-max"  # 大语言模型名称

# Standalone Question Rewrite 配置（仅用于内部文档检索）
query-rewrite:
  enabled: true
  model: "qwen3-max"
  max-history-messages: 6

# 会话摘要记忆配置（用于历史超窗后的增量压缩）
conversation-summary:
  enabled: true
  model: "qwen3-30b-a3b-instruct-2507"
  max-length: 1200

es:
  host: localhost
  port: 9200
  scheme: http
  index-name: rag_chunks

# Prometheus 配置
prometheus:
  base-url: http://localhost:9090
  timeout: 10  # 超时时间（秒）
  mock-enabled: false  # 是否启用 Mock 模式（用于测试）

# CLS 云日志服务配置
cls:
  mock-enabled: false  # true 时返回 mock 日志，false 时调用真实 CLS API
  timeout: 10
  env: prod
  secret-id: "${TENCENT_CLOUD_SECRET_ID:}"
  secret-key: "${TENCENT_CLOUD_SECRET_KEY:}"
  logset-id: ""
  topic-id: ""
  topic-name: application-logs
  service-field: service
  level-field: level
  message-field: message
  trace-id-field: traceId
  uri-field: uri
  http-status-field: httpStatus
  cost-ms-field: costMs
  exception-field: exception
  host-field: host
  pod-field: pod
  logger-field: logger
